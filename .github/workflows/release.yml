name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: false
            binary: trail
            archive: opstrail-linux-x86_64.tar.gz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            use_cross: true
            binary: trail
            archive: opstrail-linux-x86_64-musl.tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use_cross: true
            binary: trail
            archive: opstrail-linux-aarch64.tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            use_cross: false
            binary: trail
            archive: opstrail-macos-x86_64.tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            use_cross: false
            binary: trail
            archive: opstrail-macos-aarch64.tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            use_cross: false
            binary: trail.exe
            archive: opstrail-windows-x86_64.zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross == true
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use_cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} trail
          tar -czf ${{ matrix.archive }} trail install.sh README.md LICENSE
          rm trail

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\${{ matrix.binary }}" "trail.exe"
          $files = @("trail.exe", "install.ps1", "assets\integration.ps1", "README.md", "LICENSE")
          Compress-Archive -Path $files -DestinationPath "${{ matrix.archive }}"
          Remove-Item "trail.exe"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: ${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true

  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip-crates]')"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true

  publish-chocolatey:
    name: Publish to Chocolatey
    needs: release
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[skip-choco]')"
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: opstrail-windows-x86_64.zip
          path: ./artifacts

      - name: Get version and checksum
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          echo "VERSION=$version" >> $env:GITHUB_ENV

          $zipFile = Get-ChildItem -Path ./artifacts -Filter "*.zip" | Select-Object -First 1
          $hash = (Get-FileHash -Path $zipFile.FullName -Algorithm SHA256).Hash
          echo "SHA256=$hash" >> $env:GITHUB_ENV
          echo "Chocolatey SHA256: $hash"

      - name: Update nuspec
        run: |
          $nuspec = Get-Content "choco/opstrail.nuspec" -Raw
          $nuspec = $nuspec -replace '<version>.*?</version>', "<version>${{ env.VERSION }}</version>"
          Set-Content "choco/opstrail.nuspec" $nuspec

      - name: Update chocolateyinstall.ps1
        run: |
          $install = Get-Content "choco/tools/chocolateyinstall.ps1" -Raw
          $install = $install -replace "v\d+\.\d+\.\d+", "${{ github.ref_name }}"
          $install = $install -replace "checksum64\s*=\s*'[^']*'", "checksum64    = '${{ env.SHA256 }}'"
          Set-Content "choco/tools/chocolateyinstall.ps1" $install

      - name: Pack and push Chocolatey package
        run: |
          cd choco
          choco pack
          choco apikey --key ${{ secrets.CHOCOLATEY_API_KEY }} --source https://push.chocolatey.org/
          choco push opstrail.${{ env.VERSION }}.nupkg --source https://push.chocolatey.org/
        continue-on-error: true
